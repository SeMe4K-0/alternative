basePath: /api
definitions:
  apiutils.ErrorResponse:
    properties:
      error:
        example: сообщение об ошибке
        type: string
    type: object
  delivery.CreateCometRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  delivery.CreateObservationRequest:
    properties:
      declination:
        type: number
      notes:
        type: string
      observed_at:
        type: string
      right_ascension:
        type: number
    type: object
  delivery.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  delivery.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  delivery.TriggerCalculationRequest:
    properties:
      observation_ids:
        items:
          type: integer
        type: array
    type: object
  delivery.UpdateCometRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  delivery.UpdateObservationRequest:
    properties:
      declination:
        type: number
      image_url:
        type: string
      notes:
        type: string
      observed_at:
        type: string
      right_ascension:
        type: number
    type: object
  delivery.UpdateProfileRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  models.Comet:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      observations:
        items:
          $ref: '#/definitions/models.Observation'
        type: array
      orbital_calculations:
        items:
          $ref: '#/definitions/models.OrbitalCalculation'
        type: array
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.Observation:
    properties:
      comet_id:
        type: integer
      created_at:
        type: string
      declination:
        type: number
      id:
        type: integer
      image_url:
        type: string
      notes:
        type: string
      observed_at:
        type: string
      right_ascension:
        type: number
      updated_at:
        type: string
    type: object
  models.OrbitalCalculation:
    properties:
      approach_date:
        description: '--- ИЗМЕНЕНИЕ ЗДЕСЬ: Поля из CloseApproach добавлены напрямую
          ---'
        type: string
      arg_periapsis:
        type: number
      calculated_at:
        type: string
      comet_id:
        type: integer
      created_at:
        type: string
      distance_au:
        type: number
      distance_km:
        type: number
      eccentricity:
        type: number
      id:
        type: integer
      inclination:
        type: number
      is_latest:
        type: boolean
      lon_ascending_node:
        type: number
      observations:
        description: Связь "многие-ко-многим" с наблюдениями остается
        items:
          $ref: '#/definitions/models.Observation'
        type: array
      semi_major_axis:
        type: number
      time_perihelion:
        type: string
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      updated_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: |-
    This is the API for the Don't Look Up Hackathon project.
    It allows users to track comets by submitting observations and calculating their orbits.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Comet Tracker API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password, and sets a session_id
        cookie upon success.
      parameters:
      - description: User login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/delivery.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns success message and user_id
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      summary: Log in a user
      tags:
      - users
  /auth/logout:
    post:
      description: Invalidates the current user's session by clearing the session_id
        cookie.
      produces:
      - application/json
      responses:
        "200":
          description: Returns success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: No active session to log out
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "500":
          description: Internal server error during logout
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Log out a user
      tags:
      - users
  /auth/register:
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: Creates a new user account. Can accept 'application/json' or 'multipart/form-data'
        if an avatar is being uploaded.
      parameters:
      - description: User registration data (if using JSON)
        in: body
        name: registerRequest
        required: true
        schema:
          $ref: '#/definitions/delivery.RegisterRequest'
      - description: User's email (if using multipart)
        in: formData
        name: email
        required: true
        type: string
      - description: User's password (if using multipart)
        in: formData
        name: password
        required: true
        type: string
      - description: User's username (if using multipart)
        in: formData
        name: username
        type: string
      - description: User's avatar image (if using multipart)
        in: formData
        name: avatar
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Invalid request body or required fields are missing
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "409":
          description: User with this email or username already exists
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      summary: Register a new user
      tags:
      - users
  /calculations/{calculation_id}:
    delete:
      description: Deletes a calculation result by its ID.
      parameters:
      - description: ID of the calculation to delete
        in: path
        name: calculation_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid calculation ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Calculation not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a calculation result
      tags:
      - calculations
    get:
      description: Retrieves a single orbital calculation result by its ID.
      parameters:
      - description: ID of the calculation
        in: path
        name: calculation_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.OrbitalCalculation'
        "400":
          description: Invalid calculation ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Calculation not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a specific calculation result
      tags:
      - calculations
  /comets:
    get:
      description: Retrieves a list of all comets owned by the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Comet'
            type: array
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List all comets for the current user
      tags:
      - comets
    post:
      consumes:
      - application/json
      description: Creates a new comet entry associated with the authenticated user.
      parameters:
      - description: Comet information
        in: body
        name: comet
        required: true
        schema:
          $ref: '#/definitions/delivery.CreateCometRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Comet'
        "400":
          description: Invalid request body or name is required
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a new comet
      tags:
      - comets
  /comets/{comet_id}/calculations:
    get:
      description: Retrieves the history of all orbital calculations performed for
        a specific comet.
      parameters:
      - description: ID of the comet
        in: path
        name: comet_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.OrbitalCalculation'
            type: array
        "400":
          description: Invalid comet ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied to comet
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Comet not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List calculation history for a comet
      tags:
      - calculations
    post:
      consumes:
      - application/json
      description: Starts a new orbit calculation for a given comet using a specified
        list of observation IDs. Requires at least 5 observations.
      parameters:
      - description: ID of the comet
        in: path
        name: comet_id
        required: true
        type: integer
      - description: List of observation IDs to use for calculation
        in: body
        name: observation_ids
        required: true
        schema:
          $ref: '#/definitions/delivery.TriggerCalculationRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/models.OrbitalCalculation'
        "400":
          description: Invalid input, e.g., not enough observations or an observation
            does not belong to the comet
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied to comet
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Comet or one of the observations not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Trigger a new orbit calculation
      tags:
      - calculations
  /comets/{comet_id}/observations:
    get:
      description: Retrieves all observation records for a specific comet.
      parameters:
      - description: ID of the comet
        in: path
        name: comet_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Observation'
            type: array
        "400":
          description: Invalid comet ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied to comet
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Comet not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List all observations for a comet
      tags:
      - observations
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: Adds a new observation record to a specific comet. Can accept JSON
        or multipart/form-data for image uploads.
      parameters:
      - description: ID of the comet to add observation to
        in: path
        name: comet_id
        required: true
        type: integer
      - description: Observation data (if using JSON)
        in: body
        name: observation
        schema:
          $ref: '#/definitions/delivery.CreateObservationRequest'
      - description: Observation timestamp in RFC3339 format (if using multipart)
        in: formData
        name: observed_at
        required: true
        type: string
      - description: Right Ascension in degrees (if using multipart)
        in: formData
        name: right_ascension
        required: true
        type: number
      - description: Declination in degrees (if using multipart)
        in: formData
        name: declination
        required: true
        type: number
      - description: Notes about the observation (if using multipart)
        in: formData
        name: notes
        type: string
      - description: Image of the observation (if using multipart)
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Observation'
        "400":
          description: Invalid request data or comet ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied to parent comet
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Parent comet not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create an observation for a comet
      tags:
      - observations
  /comets/{id}:
    delete:
      description: Deletes a comet by its ID. User must be the owner.
      parameters:
      - description: Comet ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid comet ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Comet not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a comet
      tags:
      - comets
    get:
      description: Retrieves a specific comet by its ID. User must be the owner.
      parameters:
      - description: Comet ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Comet'
        "400":
          description: Invalid comet ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Comet not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a comet by ID
      tags:
      - comets
    put:
      consumes:
      - application/json
      description: Updates a comet's name and/or description. User must be the owner.
      parameters:
      - description: Comet ID
        in: path
        name: id
        required: true
        type: integer
      - description: Comet data to update
        in: body
        name: comet
        required: true
        schema:
          $ref: '#/definitions/delivery.UpdateCometRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Comet'
        "400":
          description: Invalid comet ID or request body
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Comet not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update a comet
      tags:
      - comets
  /observations/{observation_id}:
    delete:
      description: Deletes an observation by its ID.
      parameters:
      - description: ID of the observation to delete
        in: path
        name: observation_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid observation ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Observation not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete an observation
      tags:
      - observations
    get:
      description: Retrieves a single observation by its ID.
      parameters:
      - description: ID of the observation
        in: path
        name: observation_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Observation'
        "400":
          description: Invalid observation ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Observation not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a single observation
      tags:
      - observations
    put:
      consumes:
      - application/json
      - multipart/form-data
      description: Updates an existing observation record.
      parameters:
      - description: ID of the observation to update
        in: path
        name: observation_id
        required: true
        type: integer
      - description: Updated observation data (if using JSON)
        in: body
        name: observation
        schema:
          $ref: '#/definitions/delivery.UpdateObservationRequest'
      - description: Updated timestamp in RFC3339 format (if using multipart)
        in: formData
        name: observed_at
        required: true
        type: string
      - description: Updated Right Ascension in degrees (if using multipart)
        in: formData
        name: right_ascension
        required: true
        type: number
      - description: Updated Declination in degrees (if using multipart)
        in: formData
        name: declination
        required: true
        type: number
      - description: Updated notes (if using multipart)
        in: formData
        name: notes
        type: string
      - description: New image for the observation (if using multipart)
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Observation'
        "400":
          description: Invalid request data or observation ID
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: Observation not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update an observation
      tags:
      - observations
  /profile/me:
    get:
      description: Retrieves the profile information for the currently authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get current user's profile
      tags:
      - users
    put:
      consumes:
      - application/json
      - multipart/form-data
      description: Updates the profile information (username, password, avatar) for
        the currently authenticated user.
      parameters:
      - description: Profile data to update (if using JSON)
        in: body
        name: updateRequest
        required: true
        schema:
          $ref: '#/definitions/delivery.UpdateProfileRequest'
      - description: New username (if using multipart)
        in: formData
        name: username
        type: string
      - description: New password (if using multipart)
        in: formData
        name: password
        type: string
      - description: New avatar image (if using multipart)
        in: formData
        name: avatar
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Invalid request body or form data
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apiutils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update current user's profile
      tags:
      - users
securityDefinitions:
  ApiKeyAuth:
    in: cookie
    name: session_id
    type: apiKey
swagger: "2.0"
