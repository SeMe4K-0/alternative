  # backend:
  #   build:
  #     context: . # Указывает, что Dockerfile находится в текущей папке (./backend)
  #   container_name: backend_service
  #   restart: unless-stopped
  #   env_file:
  #     - ./.env # Загружаем переменные окружения из .env файла
  #   ports:
  #     - "8080:8080" # Пробрасываем порт, указанный в SERVER_PORT
  #   depends_on:
  #     - postgres
  #     - redis
  #     - minio

  # 2. Плейсхолдер для вашего Python-сервиса
  # python-service:
  #   build: ../python-service # Укажите путь к вашему Python-приложению
  #   container_name: python_calculator
  #   restart: unless-stopped
  #   ports:
  #     - "5001:5001"
  
  # 3. Сервис для базы данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432" # Внимание: для подключения с хоста используйте порт 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 4. Сервис для кэша сессий Redis
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # 5. Сервис для хранения файлов MinIO
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

  # 6. Сервис для веб-интерфейса к БД
  adminer:
    image: adminer
    container_name: db_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  minio_data: